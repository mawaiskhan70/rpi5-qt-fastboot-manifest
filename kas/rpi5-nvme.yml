# kas/rpi5-nvme.yml
# Top-level kas config for NVMe target (M.2 HAT+ on RPi5)
#
# Usage:
#   ./scripts/build.sh nvme

header:
  version: 19
  includes:
    - kas/rpi5-sd.yml

local_conf_header:
  nvme-overlay: |
    RPI_EXTRA_CONFIG += "dtoverlay=nvme \n"
  image-naming: |
    IMAGE_NAME_SUFFIX = "-nvme"
