# kas/rpi5-sd.yml
# Top-level kas config for SD card target
#
# Usage:
#   ./scripts/build.sh sd

header:
  version: 19
  includes:
    - kas/base.yml

local_conf_header:
  sd-boot: |
    RPI_EXTRA_CONFIG += " \
        boot_delay=0 \n \
        disable_splash=1 \n \
        camera_auto_detect=0 \n \
        display_auto_detect=0 \n \
    "
  image-naming: |
    IMAGE_NAME_SUFFIX = "-sd"
